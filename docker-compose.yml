volumes:
  vault-data:

services:
  bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ark-vault-bot
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - TZ=Asia/Jakarta
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    volumes:
      - vault-data:/data/badger
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.5"
